<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Unit Attendance System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="flex flex-center" style="min-height: 100vh;">
            <div class="card" style="width: 100%; max-width: 400px;">
                <div class="text-center mb-4">
                    <h1 class="logo mb-3" style="font-size: 2rem;">ATTENDANCE</h1>
                    <p class="text-muted">Create Your Account</p>
                </div>

                <div id="authMessage" class="alert hidden"></div>

                <form id="signupForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            placeholder="John Doe"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="trainer@example.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" required>
                            <option value="">-- Select Department --</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        Sign Up
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <p class="text-muted">Already have an account? 
                        <a href="index.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        /**
         * Load departments on page load
         */
        async function loadDepartments() {
            try {
                const response = await ApiModule.getDepartments();
                const select = document.getElementById('department');

                response.departments.forEach(dept => {
                    const option = document.createElement('option');
                    option.value = dept.id;
                    option.textContent = dept.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading departments:', error);
            }
        }

        /**
         * Signup Form Handler
         */
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const departmentId = parseInt(document.getElementById('department').value);
            const messageEl = document.getElementById('authMessage');

            // Validate
            if (!fullName.trim()) {
                messageEl.textContent = 'Full name is required';
                messageEl.className = 'alert alert-danger';
                messageEl.classList.remove('hidden');
                return;
            }

            if (!Utils.validateEmail(email)) {
                messageEl.textContent = 'Please enter a valid email';
                messageEl.className = 'alert alert-danger';
                messageEl.classList.remove('hidden');
                return;
            }

            if (password.length < 6) {
                messageEl.textContent = 'Password must be at least 6 characters';
                messageEl.className = 'alert alert-danger';
                messageEl.classList.remove('hidden');
                return;
            }

            if (password !== confirmPassword) {
                messageEl.textContent = 'Passwords do not match';
                messageEl.className = 'alert alert-danger';
                messageEl.classList.remove('hidden');
                return;
            }

            if (!departmentId) {
                messageEl.textContent = 'Please select a department';
                messageEl.className = 'alert alert-danger';
                messageEl.classList.remove('hidden');
                return;
            }

            // Signup
            const result = await AuthModule.signup(email, password, fullName, departmentId);

            if (result.success) {
                messageEl.textContent = result.message;
                messageEl.className = 'alert alert-success';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                messageEl.textContent = result.message;
                messageEl.className = 'alert alert-danger';
            }

            messageEl.classList.remove('hidden');
        });

        // Load departments on page load
        loadDepartments();

        // Check if already logged in
        if (AuthModule.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
