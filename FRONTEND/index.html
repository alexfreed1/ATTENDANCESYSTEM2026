<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Unit Attendance System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="flex flex-center" style="min-height: 100vh;">
            <div class="card" style="width: 100%; max-width: 400px;">
                <div class="text-center mb-4">
                    <h1 class="logo mb-3" style="font-size: 2rem;">ATTENDANCE</h1>
                    <p class="text-muted">Unit Attendance Management System</p>
                </div>

                <div id="authMessage" class="alert hidden"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="trainer@example.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        Sign In
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <p class="text-muted">Don't have an account? 
                        <a href="signup.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Sign up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        /**
         * Login Form Handler
         */
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('authMessage');

            // Validate
            if (!Utils.validateEmail(email)) {
                messageEl.textContent = 'Please enter a valid email';
                messageEl.className = 'alert alert-danger';
                return;
            }

            if (password.length < 6) {
                messageEl.textContent = 'Password must be at least 6 characters';
                messageEl.className = 'alert alert-danger';
                return;
            }

            // Login
            const result = await AuthModule.login(email, password);

            if (result.success) {
                messageEl.textContent = 'Login successful! Redirecting...';
                messageEl.className = 'alert alert-success';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                messageEl.textContent = result.message;
                messageEl.className = 'alert alert-danger';
            }

            messageEl.classList.remove('hidden');
        });

        // Check if already logged in
        if (AuthModule.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
