services:
  - type: web
    name: attendance-backend
    runtime: python
    plan: free
    rootDir: BACKEND
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: false
  - type: web
    name: attendance-frontend
    runtime: static
    plan: free
    rootDir: FRONTEND
